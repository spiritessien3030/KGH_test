name: Build APK (Forced Modern Gradle Fix)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ======================
      # Checkout
      # ======================
      - name: Checkout repository
        uses: actions/checkout@v4

      # ======================
      # Setup Java 17
      # ======================
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # ======================
      # Install Gradle 8.5 (FORCE FIX)
      # ======================
      - name: Install modern Gradle
        run: |
          wget https://services.gradle.org/distributions/gradle-8.5-bin.zip
          unzip gradle-8.5-bin.zip
          echo "$PWD/gradle-8.5/bin" >> $GITHUB_PATH
          gradle -v

      # ======================
      # Fix broken old wrapper (ignore it)
      # ======================
      - name: Remove broken wrapper if exists
        run: |
          rm -rf gradle/wrapper || true
          rm -f gradlew || true

      # ======================
      # Show project structure
      # ======================
      - name: Debug project
        run: |
          echo "==== FILE TREE ===="
          ls -R | head -200

      # ======================
      # Build APK (modern gradle)
      # ======================
      - name: Build APK
        run: |
          gradle assembleDebug | tee build.log

      # ======================
      # Find APK anywhere
      # ======================
      - name: Locate APK
        run: |
          echo "Searching APK..."
          find . -type f -name "*.apk" | tee apk-list.txt

      # ======================
      # FAIL if APK not created
      # ======================
      - name: Verify APK exists
        run: |
          if ! find . -name "*.apk" | grep -q apk; then
            echo "❌ NO APK GENERATED"
            echo "Build failed or project is not valid Android project"
            cat build.log
            exit 1
          fi

      # ======================
      # Upload APK
      # ======================
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk-output
          path: "**/*.apk"

      # ======================
      # Upload logs
      # ======================
      - name: Upload build logs
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: build.log
