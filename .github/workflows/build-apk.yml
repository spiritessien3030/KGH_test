name: Build APK (Auto Fix Gradle)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install Gradle
        run: |
          sudo apt-get update
          sudo apt-get install -y gradle

      # ✅ AUTO GENERATE GRADLE WRAPPER IF MISSING
      - name: Generate Gradle Wrapper if missing
        run: |
          if [ ! -f "./gradlew" ]; then
            echo "gradlew not found — generating wrapper..."
            gradle wrapper
          fi

      - name: Make gradlew executable
        run: chmod +x gradlew || true

      - name: Show project structure (debug)
        run: |
          echo "===== ROOT FILES ====="
          ls -la
          echo "===== APP STRUCTURE ====="
          find . -maxdepth 3 -type f

      - name: Build APK (Debug)
        run: |
          ./gradlew assembleDebug | tee build.log

      # ✅ Upload APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/*.apk

      # ✅ Upload full build logs
      - name: Upload build logs
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: build.log
