name: Build APK (Full Auto Fix)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # =========================
      # 1. Checkout
      # =========================
      - name: Checkout repository
        uses: actions/checkout@v4

      # =========================
      # 2. Setup Java
      # =========================
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # =========================
      # 3. Install Gradle (fallback)
      # =========================
      - name: Install Gradle
        run: |
          sudo apt-get update
          sudo apt-get install -y gradle

      # =========================
      # 4. Generate Gradle Wrapper if missing
      # =========================
      - name: Ensure Gradle Wrapper
        run: |
          if [ ! -f "./gradlew" ]; then
            echo "gradlew missing → generating wrapper..."
            gradle wrapper
          fi

      - name: Make gradlew executable
        run: chmod +x gradlew || true

      # =========================
      # 5. Debug project structure
      # =========================
      - name: Show project structure
        run: |
          echo "===== FILE TREE ====="
          ls -R | head -200

      # =========================
      # 6. Build APK + log output
      # =========================
      - name: Build APK
        run: |
          if [ -f "./gradlew" ]; then
            ./gradlew assembleDebug | tee build.log
          else
            gradle assembleDebug | tee build.log
          fi

      # =========================
      # 7. Find APK dynamically
      # =========================
      - name: Locate APK files
        run: |
          echo "Searching for APK files..."
          find . -type f -name "*.apk" | tee apk-list.txt

      # =========================
      # 8. Fail if no APK exists
      # =========================
      - name: Verify APK generated
        run: |
          if ! find . -name "*.apk" | grep -q apk; then
            echo "❌ BUILD FAILED: No APK generated"
            echo "Check logs below"
            cat build.log
            exit 1
          fi

      # =========================
      # 9. Upload APK (dynamic path)
      # =========================
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk-output
          path: |
            **/*.apk

      # =========================
      # 10. Upload full build logs
      # =========================
      - name: Upload build logs
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: build.log
