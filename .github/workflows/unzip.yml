name: Auto Extract NexusTrack ZIP

on:
  push:
    paths:
      - "NexusTrack.zip"

permissions:
  contents: write

jobs:
  extract:
    if: github.actor != 'github-actions[bot]'   # ✅ Proper loop prevention
    runs-on: ubuntu-latest

    steps:
      # 📥 Checkout repository (with push capability)
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      # 📦 Verify ZIP exists
      - name: Verify ZIP file exists
        run: |
          if [ ! -f "NexusTrack.zip" ]; then
            echo "❌ NexusTrack.zip not found!"
            exit 1
          fi

      # 🧪 Validate ZIP integrity (prevents corruption issues)
      - name: Validate ZIP
        run: unzip -t NexusTrack.zip

      # 📂 Extract ZIP safely
      - name: Extract ZIP into repository
        run: |
          echo "📂 Extracting NexusTrack.zip..."
          unzip -o NexusTrack.zip -d .

      # 🧹 Remove ZIP after extraction
      - name: Delete ZIP file
        run: |
          echo "🧹 Removing ZIP file..."
          rm -f NexusTrack.zip

      # 🔍 Debug (optional but useful)
      - name: Show git status
        run: git status

      # 💾 Commit changes (SAFE)
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions@users.noreply.github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "CI: Extract NexusTrack.zip and remove archive"
          fi

      # 🚀 Push changes (FIXED)
      - name: Push changes
        run: |
          git push origin HEAD:${{ github.ref_name }}
