name: Auto Extract NexusTrack ZIP

on:
  push:
    paths:
      - "NexusTrack.zip"
  workflow_dispatch:   # ✅ allows manual run

permissions:
  contents: write

jobs:
  extract:
    if: github.actor != 'github-actions[bot]'   # ✅ prevent infinite loop
    runs-on: ubuntu-latest

    steps:
      # 📥 Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      # 📦 Check if ZIP exists
      - name: Verify ZIP file exists
        run: |
          if [ ! -f "NexusTrack.zip" ]; then
            echo "❌ NexusTrack.zip not found!"
            exit 1
          fi

      # 🧪 Validate ZIP integrity
      - name: Validate ZIP
        run: unzip -t NexusTrack.zip

      # 📂 Extract ZIP
      - name: Extract ZIP
        run: |
          echo "📂 Extracting NexusTrack.zip..."
          unzip -o NexusTrack.zip -d .

      # 🧹 Delete ZIP after extraction
      - name: Remove ZIP
        run: |
          echo "🧹 Deleting ZIP file..."
          rm -f NexusTrack.zip

      # 🔍 Debug (optional)
      - name: Show git status
        run: git status

      # 💾 Commit changes safely
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions@users.noreply.github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "CI: Extract NexusTrack.zip and remove archive"
          fi

      # 🚀 Push back to same branch
      - name: Push changes
        run: |
          git push origin HEAD:${{ github.ref_name }}
